name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Pack smoke test
        run: |
          mkdir -p /tmp/smoke-test
          cd packages/sigilid && npm pack --pack-destination /tmp/smoke-test && cd -
          cd /tmp/smoke-test
          npm init -y > /dev/null
          npm install ./sigilid-*.tgz > /dev/null
          node --input-type=module -e "
            import { generateId } from 'sigilid';
            import { generatePrefixedId } from 'sigilid/prefix';
            import { createTypedGenerator } from 'sigilid/typed';
            import { isValidId } from 'sigilid/validate';
            import { createAlphabet } from 'sigilid/alphabet';
            import { generateNonSecureId } from 'sigilid/non-secure';
            if (!generateId()) throw new Error('generateId failed');
            if (!generatePrefixedId('usr').startsWith('usr_')) throw new Error('prefix failed');
            if (!createTypedGenerator('usr')().startsWith('usr_')) throw new Error('typed failed');
            if (!isValidId(generateId())) throw new Error('isValidId failed');
            if (!createAlphabet('abc').generate()) throw new Error('alphabet failed');
            if (!generateNonSecureId()) throw new Error('non-secure failed');
            console.log('all subpath imports resolved and functional');
          "
