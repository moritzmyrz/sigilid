name: Size

on:
  pull_request:
    branches: [main]

jobs:
  size:
    name: Check bundle size
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: packages/sigilid/
          package_manager: npm
